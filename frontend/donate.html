<!DOCTYPE html>
<html>
<head>
    <title>Donate</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/buttons.css">
    <link rel="stylesheet" href="css/forms.css">
</head>

<body>

<div id="navbar"></div>

<div class="page-wrapper">
    <div class="container">

        <div class="section-header">
            <h2>Make a Donation</h2>
        </div>

        <div class="card">
            <div class="card-body">

                <form id="donationForm">

                    <div class="form-group">
                        <label>Select Club</label>
                        <select id="club" required>
                            <option value="">Choose a club...</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Amount ($)</label>
                        <input type="number" id="amount" min="1" step="0.01" required>
                    </div>

                    <div class="form-group">
                        <label>Message (Optional)</label>
                        <textarea id="message" placeholder="Leave a message for the club..."></textarea>
                    </div>

                    <div class="form-group" id="guestFields" style="display: none;">
                        <label>Your Name</label>
                        <input type="text" id="guestName" placeholder="Enter your name">
                    </div>

                    <div class="form-group" id="guestEmailField" style="display: none;">
                        <label>Your Email</label>
                        <input type="email" id="guestEmail" placeholder="Enter your email">
                    </div>

                    <button type="submit" class="btn btn-primary">
                        Donate
                    </button>

                </form>

            </div>
        </div>

    </div>
</div>

<div id="footer"></div>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/donations.js"></script>

<script>
Utils.renderNavbar('donate');
Utils.renderFooter();

Donations.init();
</script>

</body>
</html>
