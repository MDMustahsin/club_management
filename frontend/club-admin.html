<!DOCTYPE html>
<html>
<head>
    <title>Club Admin Panel</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/buttons.css">
    <link rel="stylesheet" href="css/cards.css">
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<div id="navbar"></div>

<h2>My Club Dashboard</h2>

<div class="dashboard-layout">

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-section">
            <div class="sidebar-label">Club Admin</div>

            <div class="sidebar-link active" onclick="ClubAdmin.showSection(event, 'overview')">
                📊 Overview
            </div>

            <div class="sidebar-link" onclick="ClubAdmin.showSection(event, 'pending')">
                🏛️ Pending Applications
            </div>

            <div class="sidebar-link" onclick="ClubAdmin.showSection(event, 'members')">
                👥 Members
            </div>

            <div class="sidebar-link" onclick="ClubAdmin.showSection(event, 'events')">
                📅 Events
            </div>
        </div>
    </div>

    <!-- Main -->
    <div class="dashboard-main">

        <!-- Overview -->
        <div id="overview" class="dashboard-section active">
            <h2>My Clubs</h2>
            <div id="my-clubs-list" class="grid-3"></div>
        </div>

        <!-- Pending Applications -->
        <div id="pending" class="dashboard-section">
            <h2>Pending Membership Applications</h2>
            <div id="pending-list" class="grid-3"></div>
        </div>

        <!-- Members -->
        <div id="members" class="dashboard-section">
            <h2>Club Members</h2>
            <div id="members-list" class="grid-3"></div>
        </div>

        <!-- Events -->
        <div id="events" class="dashboard-section">
            <h2>Club Events</h2>

            <div id="create-club-event-section" style="display:none; margin-bottom: 24px;">
                <div class="card">
                    <div class="card-body">
                        <h3>Create Event for Selected Club</h3>
                        <form id="club-admin-create-event-form">
                            <div class="form-group">
                                <label>Event Title</label>
                                <input type="text" id="club-event-title" required>
                            </div>
                            <div class="form-group">
                                <label>Description</label>
                                <textarea id="club-event-description" required></textarea>
                            </div>
                            <div class="form-group">
                                <label>Date & Time</label>
                                <input type="datetime-local" id="club-event-date" required>
                            </div>
                            <div class="form-group">
                                <label>Location</label>
                                <input type="text" id="club-event-location" required>
                            </div>
                            <div class="form-group">
                                <label>Capacity</label>
                                <input type="number" id="club-event-capacity" min="1" required>
                            </div>
                            <button type="submit" class="btn btn-primary">Create Event</button>
                        </form>
                    </div>
                </div>
            </div>

            <div id="club-events-list" class="grid-3"></div>
        </div>

    </div>
</div>

<div id="footer"></div>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/club-admin.js"></script>

<script>
Utils.renderNavbar();
Utils.renderFooter();

ClubAdmin.init();
</script>

</body>
</html>
