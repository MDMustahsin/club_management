<!DOCTYPE html>
<html>
<head>
    <title>Events</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/buttons.css">
    <link rel="stylesheet" href="css/cards.css">
    <link rel="stylesheet" href="css/forms.css">
</head>

<body>

<div id="navbar"></div>

<div class="page-wrapper">
    <div class="container">

        <!-- Create Event Control (button and hidden form) -->
        <div id="create-event-control" style="display: none; margin-bottom: 20px;">
            <button id="show-create-event-btn" class="btn btn-primary">+ Create New Event</button>
        </div>
        <div id="create-event-section" style="display: none;">
            <div class="card">
                <div class="card-body">
                    <h3>Create New Event</h3>
                    <form id="create-event-form">
                        <div class="form-group">
                            <label>Club</label>
                            <select id="event-club" required>
                                <option value="">Select a club...</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Event Title</label>
                            <input type="text" id="event-title" required>
                        </div>
                        <div class="form-group">
                            <label>Description</label>
                            <textarea id="event-description" required></textarea>
                        </div>
                        <div class="form-group">
                            <label>Date & Time</label>
                            <input type="datetime-local" id="event-date" required>
                        </div>
                        <div class="form-group">
                            <label>Location</label>
                            <input type="text" id="event-location" required>
                        </div>
                        <div class="form-group">
                            <label>Capacity</label>
                            <input type="number" id="event-capacity" min="1" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Create Event</button>
                    </form>
                </div>
            </div>
            <br><br>
        </div>

        <div class="section-header">
            <h2>All Events</h2>
        </div>

        <div id="events-grid" class="grid-3"></div>

    </div>
</div>

<div id="footer"></div>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/events.js"></script>

<script>
Utils.renderNavbar('events');
Utils.renderFooter();
</script>

</body>
</html>
