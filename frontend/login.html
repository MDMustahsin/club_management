<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/buttons.css">
    <link rel="stylesheet" href="css/cards.css">
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body class="auth-page">

<div class="auth-card">

   <a href="index.html" class="auth-logo">
    <h1>🎓 Club<span>Hub</span></h1>
    <p>Create your account</p>
</a>

    <form id="loginForm">

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" required>
        </div>

        <button class="btn btn-primary btn-full">Login</button>

    </form>

    <div class="auth-footer">
        Don't have an account? <a href="register.html">Register</a>
    </div>

</div>

<!-- JS -->
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    try {
        const result = await Auth.login(email, password);

        if (result.success) {
            Utils.showToast('Login successful! 🎉');
            // Redirect based on role
            if (Auth.isAdmin()) {
                Utils.redirect('admin.html');
            } else if (Auth.isClubAdmin()) {
                Utils.redirect('club-admin.html');
            } else {
                Utils.redirect('dashboard.html');
            }
        } else {
            Utils.showToast(result.error.detail || 'Invalid email or password', 'error');
        }

    } catch (err) {
        Utils.showToast('Something went wrong', 'error');
    }
});
</script>

</body>
</html>
